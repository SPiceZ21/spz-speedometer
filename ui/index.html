<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SPZ · Speedometer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
@font-face { font-family: 'Panchang'; src: url('public/fonts/Panchang-Variable.ttf') format('truetype'); font-weight: 100 900; }

/* ── TOKENS (matches spz-ui canonical) ──────────────────────── */
:root {
  --color-primary:  #FF6200;
  --text-primary:   #FFFFFF;
  --text-secondary: rgba(255,255,255,0.4);
  --text-muted:     rgba(255,255,255,0.2);
  --border-muted:   rgba(255,255,255,0.1);
  --bg-glass:       rgba(255,255,255,0.05);
  --font-display:   'Panchang', sans-serif;
  --font-mono:      'JetBrains Mono', monospace;
  --ease-out:       cubic-bezier(0,0,0.2,1);
}

/* ── RESET ──────────────────────────────────────────────────── */
* { box-sizing: border-box; }
html, body { margin:0; padding:0; width:100vw; height:100vh; overflow:hidden; background:transparent; -webkit-font-smoothing:antialiased; }

/* ── HUD ROOT ───────────────────────────────────────────────── */
.hud-wrap {
  position: fixed; bottom: 5vh; right: 4vw;
  display: flex; flex-direction: column; align-items: flex-end; gap: 12px;
  pointer-events: none;
}

/* ── SPEEDO SHELL (skewed container) ───────────────────────── */
.speedo-container {
  width: 340px;
  display: flex; flex-direction: column; gap: 8px;
  filter: drop-shadow(0 8px 24px rgba(0,0,0,0.6));
  transform: skew(-12deg);
}

/* ── RPM BAR ────────────────────────────────────────────────── */
.rpm-bar { display: flex; gap: 2px; height: 14px; margin-bottom: 2px; }
.rpm-seg {
  flex: 1;
  background: var(--bg-glass);
  clip-path: polygon(15% 0%, 100% 0%, 85% 100%, 0% 100%);
  transition: background 80ms;
}
.rpm-seg[data-active="true"]                          { background: rgba(255,255,255,0.35); }
.rpm-seg[data-current="true"]                         { background: var(--text-primary); box-shadow: 0 0 16px rgba(255,255,255,0.8); }
/* Orange zone: last 8 segments */
.rpm-seg[data-redline="true"][data-active="true"]     { background: var(--color-primary); }
.rpm-seg[data-redline="true"][data-current="true"]    { background: var(--color-primary); box-shadow: 0 0 16px rgba(255,98,0,0.9); }

/* ── STATS ROW ──────────────────────────────────────────────── */
.stats-row { display: flex; align-items: flex-end; gap: 16px; transform: skew(12deg); }

.gear-box {
  width: 54px; height: 60px;
  background: var(--bg-glass); border: 1px solid var(--border-muted);
  display: flex; align-items: center; justify-content: center; border-radius: 4px;
}
.gear-val {
  font-family: var(--font-display); font-weight: 800; font-size: 36px;
  color: var(--text-primary); line-height: 1;
}

.speed-box { display: flex; align-items: baseline; gap: 4px; }
.speed-val {
  font-family: var(--font-display); font-weight: 800; font-size: 64px;
  color: var(--text-primary); line-height: 0.8; letter-spacing: -2px;
}
.speed-unit {
  font-family: var(--font-mono); font-size: 14px; font-weight: 700;
  color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.1em;
}

/* ── BOTTOM ROW ─────────────────────────────────────────────── */
.bottom-row {
  display: flex; align-items: center; gap: 12px;
  transform: skew(12deg); margin-top: 4px;
  background: rgba(0,0,0,0.2); padding: 6px 10px;
  border-radius: 4px; border: 1px solid var(--border-muted);
}

/* ── ASSIST INDICATORS ──────────────────────────────────────── */
.ind-group { display: flex; gap: 8px; }
.ind-chip {
  font-family: var(--font-mono); font-size: 9px; font-weight: 800;
  color: var(--text-muted); transition: all 150ms;
}
.ind-chip[data-active="true"] { color: var(--text-primary); text-shadow: 0 0 8px rgba(255,255,255,0.5); }

/* ── NOS BAR ────────────────────────────────────────────────── */
.nos-mini-wrap { flex: 1; display: flex; align-items: center; gap: 8px; }
.nos-label     { font-family: var(--font-mono); font-size: 9px; font-weight: 700; color: var(--color-primary); letter-spacing: 0.08em; }
.nos-bar       { flex: 1; height: 4px; background: rgba(255,255,255,0.05); border-radius: 2px; overflow: hidden; }
.nos-fill      { height: 100%; background: var(--color-primary); box-shadow: 0 0 10px rgba(255,98,0,0.5); transition: width 300ms var(--ease-out); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/preact@latest/dist/preact.min.js"></script>
<script src="https://unpkg.com/preact@latest/hooks/dist/hooks.umd.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>

<script type="text/babel">
/** @jsx h */
const { h, render } = preact;
const { useState, useEffect, useMemo } = preactHooks;

const SEGMENTS  = 40;
const REDLINE   = 32; /* last 8 segments light orange */

function App() {
  const [visible, setVisible] = useState(false);
  const [data, setData] = useState({
    speed: 0, gear: 1, rpm: 0, maxRpm: 8000,
    assists: { tcs: false, abs: false, esc: false },
    nos: { hasNitro: false, level: 0, flowRate: 1.0, mode: 'nitro' },
  });

  useEffect(() => {
    const handler = (e) => {
      if      (e.data.type === 'update') setData(e.data);
      else if (e.data.type === 'show')   setVisible(true);
      else if (e.data.type === 'hide')   setVisible(false);
    };
    window.addEventListener('message', handler);
    return () => window.removeEventListener('message', handler);
  }, []);

  const activeSegments = useMemo(() => {
    const pct = data.rpm / (data.maxRpm || 8000);
    return Math.floor(pct * SEGMENTS);
  }, [data.rpm, data.maxRpm]);

  if (!visible) return null;

  const gear = data.gear === 0 ? 'R' : data.gear;

  return (
    <div className="hud-wrap">
      <div className="speedo-container">

        {/* RPM bar */}
        <div className="rpm-bar">
          {Array.from({ length: SEGMENTS }).map((_, i) => (
            <div
              key={i}
              className="rpm-seg"
              data-active={i < activeSegments}
              data-current={i === activeSegments && activeSegments < SEGMENTS}
              data-redline={i >= REDLINE}
            />
          ))}
        </div>

        {/* Gear + speed */}
        <div className="stats-row">
          <div className="gear-box">
            <span className="gear-val">{gear}</span>
          </div>
          <div className="speed-box">
            <span className="speed-val">{data.speed}</span>
            <span className="speed-unit">KM/H</span>
          </div>
        </div>

        {/* Assists + NOS */}
        <div className="bottom-row">
          <div className="ind-group">
            <span className="ind-chip" data-active={data.assists.abs}>ABS</span>
            <span className="ind-chip" data-active={data.assists.tcs}>TCS</span>
            <span className="ind-chip" data-active={data.assists.esc}>ESC</span>
          </div>

          {data.nos?.hasNitro && (
            <div className="nos-mini-wrap">
              <span className="nos-label">NOS</span>
              <div className="nos-bar">
                <div className="nos-fill" style={{ width: `${data.nos.level}%` }} />
              </div>
            </div>
          )}
        </div>

      </div>
    </div>
  );
}

render(<App />, document.getElementById('root'));
</script>
</body>
</html>
