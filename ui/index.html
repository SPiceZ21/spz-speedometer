<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SPZ · Speedometer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
@font-face { font-family: 'Panchang'; src: url('public/fonts/Panchang-Variable.ttf') format('truetype'); font-weight: 100 900; }

:root {
  --spz-fg-1: #FFFFFF;
  --spz-fg-3: #A8AEBB;
  --spz-fg-4: #5C6370;
  --spz-orange: #FFFFFF;
  --spz-info: #FFFFFF;
  --spz-surface-3: rgba(255,255,255,0.05);
  --spz-line: rgba(255,255,255,0.1);
  --spz-font-mono: 'JetBrains Mono', monospace;
  --spz-shadow-glow-soft: 0 0 12px rgba(255,255,255,0.2);
  --spz-ease-out: cubic-bezier(0,0,0.2,1);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background: transparent; -webkit-font-smoothing: antialiased; }

.hud-wrap { position: fixed; bottom: 5vh; right: 4vw; display: flex; flex-direction: column; align-items: flex-end; gap: 12px; pointer-events: none; }

.speedo-container { width: 340px; display: flex; flex-direction: column; gap: 8px; filter: drop-shadow(0 8px 24px rgba(0,0,0,0.6)); transform: skew(-12deg); }

.rpm-bar { display: flex; gap: 2px; height: 14px; margin-bottom: 2px; }
.rpm-seg { flex: 1; background: rgba(255,255,255,0.06); clip-path: polygon(15% 0%, 100% 0%, 85% 100%, 0% 100%); transition: background 80ms; }
.rpm-seg[data-active="true"] { background: rgba(255,255,255,0.4); }
.rpm-seg[data-current="true"] { background: #fff; box-shadow: 0 0 16px rgba(255,255,255,0.8); }

.stats-row { display: flex; align-items: flex-end; gap: 16px; transform: skew(12deg); }
.gear-box { width: 54px; height: 60px; background: rgba(255,255,255,0.05); border: 1px solid var(--spz-line); display: flex; align-items: center; justify-content: center; border-radius: 4px; }
.gear-val { font-family: 'Panchang', sans-serif; font-weight: 800; font-size: 36px; color: #fff; line-height: 1; }

.speed-box { display: flex; align-items: baseline; gap: 4px; }
.speed-val { font-family: 'Panchang', sans-serif; font-weight: 800; font-size: 64px; color: #fff; line-height: 0.8; letter-spacing: -2px; }
.speed-unit { font-family: var(--spz-font-mono); font-size: 14px; font-weight: 700; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 0.1em; }

.bottom-row { display: flex; align-items: center; gap: 12px; transform: skew(12deg); margin-top: 4px; background: rgba(0,0,0,0.2); padding: 6px 10px; border-radius: 4px; border: 1px solid var(--spz-line); }

.ind-group { display: flex; gap: 8px; }
.ind-chip { font-family: var(--spz-font-mono); font-size: 9px; font-weight: 800; color: rgba(255,255,255,0.1); transition: all 150ms; }
.ind-chip[data-active="true"] { color: #fff; text-shadow: 0 0 8px rgba(255,255,255,0.5); }

.nos-mini-wrap { flex: 1; display: flex; align-items: center; gap: 8px; }
.nos-bar { flex: 1; height: 4px; background: rgba(255,255,255,0.05); border-radius: 2px; overflow: hidden; }
.nos-fill { height: 100%; background: #fff; box-shadow: 0 0 10px rgba(255,255,255,0.4); transition: width 300ms var(--spz-ease-out); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/preact@latest/dist/preact.min.js"></script>
<script src="https://unpkg.com/preact@latest/hooks/dist/hooks.umd.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>

<script type="text/babel">
/** @jsx h */
const { h, render } = preact;
const { useState, useEffect, useMemo } = preactHooks;

const SEGMENTS = 40;

function App() {
  const [visible, setVisible] = useState(false);
  const [data, setData] = useState({
    speed: 0, gear: 1, rpm: 0, maxRpm: 8000,
    assists: { tcs: false, abs: false, esc: false },
    nos: { hasNitro: false, level: 0, flowRate: 1.0, mode: 'nitro' }
  });

  useEffect(() => {
    const handler = (e) => {
      if (e.data.type === 'update') setData(e.data);
      else if (e.data.type === 'show') setVisible(true);
      else if (e.data.type === 'hide') setVisible(false);
    };
    window.addEventListener('message', handler);
    return () => window.removeEventListener('message', handler);
  }, []);

  const activeSegments = useMemo(() => {
    const pct = data.rpm / (data.maxRpm || 8000);
    return Math.floor(pct * SEGMENTS);
  }, [data.rpm, data.maxRpm]);

  if (!visible) return null;

  const gear = data.gear === 0 ? 'R' : data.gear;

  return (
    <div className="hud-wrap">
      <div className="speedo-container">
        <div className="rpm-bar">
          {Array.from({ length: SEGMENTS }).map((_, i) => (
            <div key={i} className="rpm-seg"
              data-active={i < activeSegments}
              data-current={i === activeSegments && activeSegments < SEGMENTS}
            />
          ))}
        </div>

        <div className="stats-row">
          <div className="gear-box">
            <span className="gear-val">{gear}</span>
          </div>
          <div className="speed-box">
            <span className="speed-val">{data.speed}</span>
            <span className="speed-unit">KM/H</span>
          </div>
        </div>

        <div className="bottom-row">
          <div className="ind-group">
            <span className="ind-chip" data-active={data.assists.abs}>ABS</span>
            <span className="ind-chip" data-active={data.assists.tcs}>TCS</span>
            <span className="ind-chip" data-active={data.assists.esc}>ESC</span>
          </div>
          
          {data.nos?.hasNitro && (
            <div className="nos-mini-wrap">
              <div className="nos-bar">
                <div className="nos-fill" style={{ width: `${data.nos.level}%` }} />
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

render(<App />, document.getElementById('root'));
</script>
</body>
</html>
